<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Cancelled - AWSPrepAI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .cancel-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .cancel-card {
      background: white;
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .cancel-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }

    .cancel-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 1rem;
    }

    .cancel-card p {
      font-size: 1rem;
      color: #6B7280;
      margin-bottom: 2rem;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 150px;
      padding: 0.875rem 1.5rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: white;
      border: none;
    }

    .btn-secondary {
      background: white;
      color: #374151;
      border: 2px solid #E5E7EB;
    }

    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="cancel-container">
    <div class="cancel-card">
      <div class="cancel-icon">😔</div>
      <h1>Payment Cancelled</h1>
      <p>
        No worries! You can continue using the free 20 questions
        and upgrade anytime.
      </p>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="window.location.href='index.html#quiz'">
          Continue Free
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">
          Back to Home
        </button>
      </div>
    </div>
  </div>
</body>
</html>
