<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In — AWSPrepAI</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="navigation.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#F9FAFB;color:#232F3E;min-height:100vh;display:flex;flex-direction:column}
    .auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
    .auth-card{background:#fff;border:1px solid #d5dbdb;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .auth-logo{text-align:center;margin-bottom:1.75rem}
    .auth-logo a{font-size:1.4rem;font-weight:800;color:#1F2937;text-decoration:none}
    .auth-title{font-size:1.5rem;font-weight:800;color:#1F2937;margin-bottom:.35rem;text-align:center}
    .auth-subtitle{color:#545b64;font-size:.9rem;text-align:center;margin-bottom:1.75rem}
    .form-group{margin-bottom:1.1rem}
    .form-label{display:block;font-weight:600;font-size:.875rem;color:#374151;margin-bottom:.4rem}
    .form-input{width:100%;padding:.7rem 1rem;border:1px solid #d5dbdb;border-radius:8px;font-size:.95rem;color:#232F3E;transition:border-color .2s;outline:none}
    .form-input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .btn-auth{width:100%;padding:.875rem;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem}
    .btn-submit{background:#3B82F6;color:#fff}
    .btn-submit:hover{background:#2563EB}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed}
    .auth-divider{text-align:center;color:#9ca3af;font-size:.85rem;margin:1.25rem 0;position:relative}
    .auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#e5e7eb}
    .auth-divider::before{left:0}.auth-divider::after{right:0}
    .auth-footer{text-align:center;margin-top:1.5rem;font-size:.875rem;color:#545b64}
    .auth-footer a{color:#3B82F6;font-weight:600;text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}
    .forgot-link{text-align:right;margin-top:-.6rem;margin-bottom:.75rem}
    .forgot-link a{font-size:.8rem;color:#3B82F6;text-decoration:none}
    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:.65rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
    .success-msg{background:#f0fdf4;border:1px solid #bbf7d0;color:#065f46;padding:.65rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
  </style>
</head>
<body>

<nav class="main-nav" role="navigation">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-icon">☁️</span>
      <span class="nav-logo-text">AWSPrepAI</span>
    </a>
    <div class="nav-menu" id="navMenu">
      <a href="certifications.html" class="nav-link">Certifications</a>
      <a href="pricing.html" class="nav-link">Pricing</a>
    </div>
    <a href="signup.html" class="nav-cta" style="text-decoration:none;">Sign Up Free</a>
    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle navigation">
      <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
    </button>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="index.html">☁️ AWSPrepAI</a></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Log in to access your dashboard and continue studying</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="forgot-link"><a href="forgot-password.html">Forgot password?</a></div>
      <button class="btn-auth btn-submit" type="submit" id="submitBtn">Log In →</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free →</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = 'https://swkqwqtgbxymyhcnhmfv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3a3F3cXRnYnh5bXloY25obWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzEwNzcsImV4cCI6MjA4NTc0NzA3N30.RttI8lDSItgTLMR1QwstSfNakyXqsLgt5kEfmhEJxf4';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// Already logged in → go to dashboard
supa.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'user-dashboard.html';
});

async function handleLogin(e) {
  e.preventDefault();
  const btn       = document.getElementById('submitBtn');
  const errorEl   = document.getElementById('errorMsg');
  const successEl = document.getElementById('successMsg');
  errorEl.style.display   = 'none';
  successEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Logging in…';

  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  const { data, error } = await supa.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = error.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : (error.message || 'Login failed. Please try again.');
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Log In →';
    return;
  }

  const user = data.user;
  localStorage.setItem('_apa_session', data.session.access_token);
  localStorage.setItem('_apa_email', email);
  localStorage.setItem('_apa_name', user.user_metadata?.first_name || user.user_metadata?.full_name?.split(' ')[0] || '');
  localStorage.setItem('_apa_tier', user.user_metadata?.tier || 'free');

  successEl.textContent = 'Logged in! Redirecting…';
  successEl.style.display = 'block';
  setTimeout(() => window.location.href = 'user-dashboard.html', 900);
}
</script>
<script src="navigation.js"></script>
</body>
</html>
