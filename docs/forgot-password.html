<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — CertiPrepAI</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="navigation.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#F9FAFB;color:#232F3E;min-height:100vh;display:flex;flex-direction:column}
    .auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
    .auth-card{background:#fff;border:1px solid #d5dbdb;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .auth-logo{text-align:center;margin-bottom:1.75rem}
    .auth-logo a{font-size:1.4rem;font-weight:800;color:#1F2937;text-decoration:none}
    .auth-title{font-size:1.4rem;font-weight:800;color:#1F2937;margin-bottom:.35rem;text-align:center}
    .auth-subtitle{color:#545b64;font-size:.875rem;text-align:center;margin-bottom:1.75rem;line-height:1.5}
    .form-group{margin-bottom:1.1rem}
    .form-label{display:block;font-weight:600;font-size:.875rem;color:#374151;margin-bottom:.4rem}
    .form-input{width:100%;padding:.7rem 1rem;border:1px solid #d5dbdb;border-radius:8px;font-size:.95rem;color:#232F3E;transition:border-color .2s;outline:none}
    .form-input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .btn-submit{width:100%;padding:.875rem;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem;background:#2563EB;color:#fff}
    .btn-submit:hover{background:#1D4ED8}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed}
    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:.65rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
    .success-msg{background:#f0fdf4;border:1px solid #bbf7d0;color:#065f46;padding:.65rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
    .auth-footer{text-align:center;margin-top:1.25rem;font-size:.875rem;color:#6B7280}
    .auth-footer a{color:#2563EB;font-weight:600;text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}
    .back-link{display:flex;align-items:center;gap:.35rem;font-size:.875rem;color:#6B7280;text-decoration:none;margin-bottom:1.5rem;font-weight:500}
    .back-link:hover{color:#2563EB}
  </style>
</head>
<body>

<nav class="main-nav" role="navigation">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-icon">☁️</span>
      <span class="nav-logo-text">CertiPrepAI</span>
    </a>
    <div class="nav-menu">
      <a href="certifications.html" class="nav-link">Certifications</a>
      <a href="pricing.html" class="nav-link">Pricing</a>
    </div>
    <a href="login.html" class="nav-cta">Log In</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="index.html">☁️ CertiPrepAI</a>
    </div>

    <!-- Step 1: Enter email -->
    <div id="step-email">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a link to reset your password.</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <button class="btn-submit" type="submit" id="submitBtn">Send Reset Link →</button>
      </form>

      <div class="auth-footer" style="margin-top:1.25rem">
        <a href="login.html">← Back to Log In</a>
      </div>
    </div>

    <!-- Step 2: Enter code + new password -->
    <div id="step-newpass" style="display:none">
      <h1 class="auth-title">Choose new password</h1>
      <p class="auth-subtitle">Enter the 6-digit code from your email and your new password.</p>

      <div class="error-msg" id="errorMsg2"></div>
      <div class="success-msg" id="successMsg2"></div>

      <form onsubmit="handleNewPassword(event)">
        <div class="form-group">
          <label class="form-label" for="resetCode">Verification Code</label>
          <input class="form-input" type="text" id="resetCode" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="newpass">New Password</label>
          <input class="form-input" type="password" id="newpass" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="newpass2">Confirm Password</label>
          <input class="form-input" type="password" id="newpass2" placeholder="Repeat password" required minlength="8">
        </div>
        <button class="btn-submit" type="submit" id="submitBtn2">Update Password →</button>
      </form>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
<script>
const POOL_ID   = 'us-east-1_bqEVRsi2b';
const CLIENT_ID = '4j9mnlkhtu023takbj0qb1g10h';
const userPool  = new AmazonCognitoIdentity.CognitoUserPool({ UserPoolId: POOL_ID, ClientId: CLIENT_ID });
let _resetEmail = '';

// Step 1 — send reset code
async function handleReset(e) {
  e.preventDefault();
  const btn       = document.getElementById('submitBtn');
  const errorEl   = document.getElementById('errorMsg');
  const successEl = document.getElementById('successMsg');
  errorEl.style.display   = 'none';
  successEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending…';

  _resetEmail = document.getElementById('email').value.trim().toLowerCase();
  const cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: _resetEmail, Pool: userPool });

  cognitoUser.forgotPassword({
    onSuccess() {
      successEl.innerHTML = '✅ Code sent to <strong>' + _resetEmail + '</strong>. Check your inbox (and spam folder).';
      successEl.style.display = 'block';
      btn.textContent = 'Code sent ✓';
      setTimeout(() => {
        document.getElementById('step-email').style.display = 'none';
        document.getElementById('step-newpass').style.display = 'block';
      }, 1200);
    },
    onFailure(err) {
      errorEl.textContent = err.message || 'Could not send reset code. Please try again.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send Reset Link →';
    }
  });
}

// Step 2 — confirm code + new password
async function handleNewPassword(e) {
  e.preventDefault();
  const btn       = document.getElementById('submitBtn2');
  const errorEl   = document.getElementById('errorMsg2');
  const successEl = document.getElementById('successMsg2');
  errorEl.style.display = 'none';

  const code  = document.getElementById('resetCode').value.trim();
  const pass  = document.getElementById('newpass').value;
  const pass2 = document.getElementById('newpass2').value;

  if (pass !== pass2) { errorEl.textContent = 'Passwords do not match.'; errorEl.style.display = 'block'; return; }
  if (!code)           { errorEl.textContent = 'Enter the verification code.'; errorEl.style.display = 'block'; return; }

  btn.disabled = true;
  btn.textContent = 'Updating…';

  const cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: _resetEmail, Pool: userPool });
  cognitoUser.confirmPassword(code, pass, {
    onSuccess() {
      successEl.textContent = '✅ Password updated! Redirecting to login…';
      successEl.style.display = 'block';
      setTimeout(() => window.location.href = 'login.html', 1500);
    },
    onFailure(err) {
      errorEl.textContent = err.message || 'Could not update password. Please try again.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Update Password →';
    }
  });
}
</script>
<script src="navigation.js"></script>
</body>
</html>
