<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#232F3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0073BB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="240" rx="8" fill="url(#bg)" />
  <!-- Top bar (console nav) -->
  <rect y="0" width="400" height="32" rx="8" fill="rgba(0,0,0,0.3)" />
  <rect y="24" width="400" height="8" fill="rgba(0,0,0,0.3)" />
  <circle cx="16" cy="16" r="5" fill="#FF9900" />
  <rect x="28" y="11" width="60" height="10" rx="2" fill="rgba(255,255,255,0.2)" />
  <rect x="96" y="11" width="40" height="10" rx="2" fill="rgba(255,255,255,0.15)" />
  <!-- Content area -->
  <rect x="16" y="48" width="160" height="12" rx="3" fill="rgba(255,255,255,0.3)" />
  <rect x="16" y="68" width="368" height="8" rx="2" fill="rgba(255,255,255,0.1)" />
  <rect x="16" y="84" width="320" height="8" rx="2" fill="rgba(255,255,255,0.1)" />
  <!-- Simulated form elements -->
  <rect x="16" y="108" width="368" height="36" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <rect x="24" y="116" width="80" height="8" rx="2" fill="rgba(255,255,255,0.2)" />
  <rect x="16" y="152" width="368" height="36" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <rect x="24" y="160" width="120" height="8" rx="2" fill="rgba(255,255,255,0.2)" />
  <!-- Camera icon + label -->
  <text x="200" y="134" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">📸 AWS Console View</text>
  <!-- AWS logo text -->
  <text x="200" y="220" font-family="sans-serif" font-size="11" fill="rgba(255,153,0,0.8)" text-anchor="middle" font-weight="bold">AWS Management Console</text>
</svg>
