<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- Dark AWS-style background -->
  <rect width="52" height="52" rx="8" fill="#232F3E"/>
  <!-- AWS white text -->
  <text x="6" y="24" font-size="15" font-weight="900" fill="#FFFFFF" font-family="Arial,sans-serif" letter-spacing="1">AWS</text>
  <!-- Orange underline (AWS smile) -->
  <path d="M6 30 Q26 42 46 30" stroke="#FF9900" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Arrow on right end of smile -->
  <polygon points="43,26 49,31 43,34" fill="#FF9900"/>
  <!-- PREP AI in orange below -->
  <text x="6" y="47" font-size="8" font-weight="700" fill="#FF9900" font-family="Arial,sans-serif" letter-spacing="1.5">PREP·AI</text>
</svg>
