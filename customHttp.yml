customHeaders:
  - pattern: '/index.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-store, no-cache, must-revalidate'
      - key: 'Pragma'
        value: 'no-cache'
  - pattern: '/sitemap.xml'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=3600'
  - pattern: '/robots.txt'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=3600'
  - pattern: '/og-image.png'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
  - pattern: '**/*.js'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '**/*.css'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
