name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-app/package-lock.json

      - name: Install dependencies
        run: cd react-app && npm install

      # Non-blocking: surfaces existing lint debt without failing the build.
      # Flip continue-on-error to false once the pre-existing warnings are cleared.
      - name: Lint (non-blocking)
        run: cd react-app && npm run lint
        continue-on-error: true

      # Blocking: unit tests must pass. This is the regression gate.
      - name: Test
        run: cd react-app && npm test

      - name: Build (tsc + vite)
        run: cd react-app && npm run build
